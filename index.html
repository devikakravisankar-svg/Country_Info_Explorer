<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Info Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center;
            padding: 3rem 1.5rem; color: #F1F5F9;
        }
        .container { width: 100%; max-width: 480px; }
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 {
            font-size: 2.6rem; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #818CF8, #C084FC);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 0.4rem;
        }
        .header p { color: #94A3B8; font-size: 0.95rem; }
        .search-wrap {
            display: flex; margin-bottom: 1.2rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px; overflow: hidden; backdrop-filter: blur(12px);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-wrap:focus-within {
            border-color: #818CF8;
            box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
        }
        input {
            flex: 1; background: transparent; border: none; outline: none;
            padding: 1rem 1.25rem; font-size: 1rem; color: #F1F5F9;
            font-family: inherit;
        }
        input::placeholder { color: #94A3B8; }
        button {
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            border: none; padding: 0 1.5rem; color: white;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: opacity 0.2s; letter-spacing: 0.3px;
        }
        button:hover { opacity: 0.85; }
        .hints { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; justify-content: center; }
        .hint {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px; padding: 0.3rem 0.85rem;
            font-size: 0.78rem; color: #94A3B8; cursor: pointer; transition: all 0.15s;
        }
        .hint:hover { background: rgba(129,140,248,0.15); border-color: #818CF8; color: #818CF8; }
        .msg {
            display: none; text-align: center; padding: 1.2rem 1.5rem;
            border-radius: 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #94A3B8;
            font-size: 0.95rem; backdrop-filter: blur(8px); margin-bottom: 1rem;
        }
        .msg.error { color: #F87171; border-color: rgba(248,113,113,0.3); }
        .card {
            display: none;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px; overflow: hidden;
            backdrop-filter: blur(16px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .flag-wrap { width: 100%; height: 210px; overflow: hidden; background: #1a1a2e; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .flag-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .info { padding: 1.4rem 1.5rem 1.5rem; }
        .country-name { font-size: 1.7rem; font-weight: 700; margin-bottom: 1.2rem; color: #fff; }
        .fact {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); gap: 1rem;
        }
        .fact:last-child { border-bottom: none; }
        .fact-label {
            font-size: 0.78rem; font-weight: 600; color: #818CF8;
            text-transform: uppercase; letter-spacing: 0.8px; white-space: nowrap;
        }
        .fact-value { font-size: 0.95rem; font-weight: 500; color: #F1F5F9; text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Country Explorer</h1>
        <p>Search any country in the world by exact name</p>
    </div>
    <div class="search-wrap">
        <input id="si" type="text" placeholder="e.g. Japan, Brazil, India..." autocomplete="off" spellcheck="false">
        <button onclick="ps()">Search</button>
    </div>
    <div class="hints">
        <span class="hint" onclick="qs('Japan')">Japan</span>
        <span class="hint" onclick="qs('United States')">United States</span>
        <span class="hint" onclick="qs('India')">India</span>
        <span class="hint" onclick="qs('Brazil')">Brazil</span>
        <span class="hint" onclick="qs('Germany')">Germany</span>
        <span class="hint" onclick="qs('Australia')">Australia</span>
    </div>
    <div id="msg" class="msg"></div>
    <div id="card" class="card">
        <div class="flag-wrap">
            <img id="fi" src="" alt="Flag">
        </div>
        <div class="info">
            <div id="cn" class="country-name"></div>
            <div class="fact"><span class="fact-label">Capital</span><span id="ca" class="fact-value"></span></div>
            <div class="fact"><span class="fact-label">Population</span><span id="po" class="fact-value"></span></div>
            <div class="fact"><span class="fact-label">Currency</span><span id="cu" class="fact-value"></span></div>
        </div>
    </div>
</div>

const cm = {};
COUNTRIES.forEach(function(c){ if(c.name) cm[c.name.toLowerCase()] = c; });

document.getElementById('si').addEventListener('keypress', function(e){ if(e.key==='Enter') ps(); });

function qs(name){ document.getElementById('si').value = name; ps(); }

function ps(){
    var raw = document.getElementById('si').value.trim();
    if(!raw) return;
    var card = document.getElementById('card');
    var msg  = document.getElementById('msg');
    card.style.display = 'none';
    msg.style.display  = 'none';
    var c = cm[raw.toLowerCase()];
    if(!c){
        msg.innerHTML = 'No country found named <strong>' + raw + '</strong>. Please enter the exact name.';
        msg.className = 'msg error';
        msg.style.display = 'block';
        return;
    }
    var fi = document.getElementById('fi');
    if(c.iso2){
        fi.src = 'https://flagcdn.com/w640/' + c.iso2.toLowerCase() + '.png';
        fi.parentElement.style.display = 'flex';
        fi.onerror = function(){ fi.parentElement.style.display = 'none'; };
    } else {
        fi.parentElement.style.display = 'none';
    }
    document.getElementById('cn').textContent = c.name;
    document.getElementById('ca').textContent = (c.capital && c.capital !== 'N/A') ? c.capital : '-';
    document.getElementById('po').textContent = c.pop ? Number(c.pop).toLocaleString() : '-';
    document.getElementById('cu').textContent = (c.cur && c.cur !== 'N/A') ? c.cur.trim() : '-';
    card.style.display = 'none';
    void card.offsetWidth;
    card.style.display = 'block';
}
</script>
